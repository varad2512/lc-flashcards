{cat:'greedy',lc:'LC 45',d:'medium',title:'Jump Game II',
 tagline:'Minimum jumps to reach the last index.',
 tags:['greedy','window expansion'],
 insight:'Greedy: expand window to max reach. When you pass current window end, you must jump (increment count).',
 code:`<span class="kw">def</span> <span class="fn">jump</span>(nums):
    jumps = curEnd = curFar = <span class="nm">0</span>
    <span class="kw">for</span> i <span class="kw">in</span> <span class="fn">range</span>(<span class="fn">len</span>(nums)<span class="op">-</span><span class="nm">1</span>):
        curFar = <span class="fn">max</span>(curFar, i<span class="op">+</span>nums[i])
        <span class="kw">if</span> i <span class="op">==</span> curEnd:

            curEnd = curFar
    <span class="kw">return</span> jumps`},

// ─── INTERVALS ───────────────────────────────────────────────────────────────
{cat:'intervals',lc:'LC 57',d:'medium',title:'Insert Interval',
 tagline:'Insert and merge a new interval into sorted non-overlapping intervals.',
 tags:['three phases','overlap check'],
 insight:'Phase 1: add all before new. Phase 2: merge overlapping (max end). Phase 3: add remaining.',
 code:`<span class="kw">def</span> <span class="fn">insert</span>(intervals, newInterval):
    res = []; i = <span class="nm">0</span>; n = <span class="fn">len</span>(intervals)
    <span class="cm"># Phase 1: before new interval</span>
    <span class="kw">while</span> i <span class="op"><</span> n <span class="kw">and</span> intervals[i][<span class="nm">1</span>] <span class="op"><</span> newInterval[<span class="nm">0</span>]:
        res.<span class="fn">append</span>(intervals[i]); i<span class="op">+=</span><span class="nm">1</span>
    <span class="cm"># Phase 2: overlapping</span>
    <span class="kw">while</span> i <span class="op"><</span> n <span class="kw">and</span> intervals[i][<span class="nm">0</span>] <span class="op"><=</span> newInterval[<span class="nm">1</span>]:
        newInterval[<span class="nm">0</span>] = <span class="fn">min</span>(newInterval[<span class="nm">0</span>], intervals[i][<span class="nm">0</span>])
        newInterval[<span class="nm">1</span>] = <span class="fn">max</span>(newInterval[<span class="nm">1</span>], intervals[i][<span class="nm">1</span>]); i<span class="op">+=</span><span class="nm">1</span>
    res.<span class="fn">append</span>(newInterval)
    res.<span class="fn">extend</span>(intervals[i:])
    <span class="kw">return</span> res`},

{cat:'intervals',lc:'LC 56',d:'medium',title:'Merge Intervals',
 tagline:'Merge all overlapping intervals.',
 tags:['sort by start','extend end'],
 insight:'Sort by start. For each interval: if overlaps with last in res (start <= last end), extend end. Else append.',
 code:`<span class="kw">def</span> <span class="fn">merge</span>(intervals):
    intervals.<span class="fn">sort</span>()
    res = [intervals[<span class="nm">0</span>]]
    <span class="kw">for</span> start, end <span class="kw">in</span> intervals[<span class="nm">1</span>:]:
        <span class="kw">if</span> start <span class="op"><=</span> res[<span class="op">-</span><span class="nm">1</span>][<span class="nm">1</span>]:
            res[<span class="op">-</span><span class="nm">1</span>][<span class="nm">1</span>] = <span class="fn">max</span>(res[<span class="op">-</span><span class="nm">1</span>][<span class="nm">1</span>], end)
        <span class="kw">else</span>:
            res.<span class="fn">append</span>([start, end])
    <span class="kw">return</span> res`},

{cat:'intervals',lc:'LC 435',d:'medium',title:'Non-Overlapping Intervals',
 tagline:'Min intervals to remove to make rest non-overlapping.',
 tags:['greedy','sort by end'],
 insight:'Sort by end. Greedily keep interval with earliest end (less conflicts). Count removed = overlaps with current end.',
 code:`<span class="kw">def</span> <span class="fn">eraseOverlapIntervals</span>(intervals):
    intervals.<span class="fn">sort</span>(key=<span class="kw">lambda</span> x: x[<span class="nm">1</span>])
    removed = <span class="nm">0</span>
    prevEnd = <span class="fn">float</span>(<span class="st">'-inf'</span>)
    <span class="kw">for</span> start, end <span class="kw">in</span> intervals:
        <span class="kw">if</span> start <span class="op">>=</span> prevEnd:
            prevEnd = end  <span class="cm"># keep this interval</span>
        <span class="kw">else</span>:
            removed <span class="op">+=</span> <span class="nm">1</span>  <span class="cm"># remove overlap</span>
    <span class="kw">return</span> removed`},

// ─── MATH & GEOMETRY ─────────────────────────────────────────────────────────
{cat:'math',lc:'LC 48',d:'medium',title:'Rotate Image',
 tagline:'Rotate NxN matrix 90° clockwise in-place.',
 tags:['transpose','reverse rows'],
 insight:'Step 1: Transpose (swap matrix[i][j] ↔ matrix[j][i]). Step 2: Reverse each row.',
 code:`<span class="kw">def</span> <span class="fn">rotate</span>(matrix):
    n = <span class="fn">len</span>(matrix)
    <span class="cm"># Step 1: Transpose</span>
    <span class="kw">for</span> i <span class="kw">in</span> <span class="fn">range</span>(n):
        <span class="kw">for</span> j <span class="kw">in</span> <span class="fn">range</span>(i<span class="op">+</span><span class="nm">1</span>, n):
            matrix[i][j], matrix[j][i] = matrix[j][i], matrix[i][j]
    <span class="cm"># Step 2: Reverse each row</span>
    <span class="kw">for</span> row <span class="kw">in</span> matrix:
        row.<span class="fn">reverse</span>()`},

{cat:'math',lc:'LC 54',d:'medium',title:'Spiral Matrix',
 tagline:'Return all elements in spiral order.',
 tags:['4 boundaries','shrink inward'],
 insight:'Maintain top/bottom/left/right boundaries. Traverse 4 directions, shrink boundary after each pass.',
 code:`<span class="kw">def</span> <span class="fn">spiralOrder</span>(matrix):
    top, bot = <span class="nm">0</span>, <span class="fn">len</span>(matrix)<span class="op">-</span><span class="nm">1</span>
    left, right = <span class="nm">0</span>, <span class="fn">len</span>(matrix[<span class="nm">0</span>])<span class="op">-</span><span class="nm">1</span>
    res = []
    <span class="kw">while</span> top <span class="op"><=</span> bot <span class="kw">and</span> left <span class="op"><=</span> right:
        <span class="kw">for</span> c <span class="kw">in</span> <span class="fn">range</span>(left, right<span class="op">+</span><span class="nm">1</span>):  res.<span class="fn">append</span>(matrix[top][c])
        top <span class="op">+=</span> <span class="nm">1</span>
        <span class="kw">for</span> r <span class="kw">in</span> <span class="fn">range</span>(top, bot<span class="op">+</span><span class="nm">1</span>):    res.<span class="fn">append</span>(matrix[r][right])
        right <span class="op">-=</span> <span class="nm">1</span>
        <span class="kw">if</span> top <span class="op"><=</span> bot:
            <span class="kw">for</span> c <span class="kw">in</span> <span class="fn">range</span>(right, left<span class="op">-</span><span class="nm">1</span>, <span class="op">-</span><span class="nm">1</span>): res.<span class="fn">append</span>(matrix[bot][c])
            bot <span class="op">-=</span> <span class="nm">1</span>
        <span class="kw">if</span> left <span class="op"><=</span> right:
            <span class="kw">for</span> r <span class="kw">in</span> <span class="fn">range</span>(bot, top<span class="op">-</span><span class="nm">1</span>, <span class="op">-</span><span class="nm">1</span>): res.<span class="fn">append</span>(matrix[r][left])
            left <span class="op">+=</span> <span class="nm">1</span>
    <span class="kw">return</span> res`},

// ─── BIT MANIPULATION ────────────────────────────────────────────────────────
{cat:'bits',lc:'LC 136',d:'easy',title:'Single Number',
 tagline:'Find the element that appears only once (others appear twice).',
 tags:['XOR','x^x=0'],
 insight:'XOR of a number with itself = 0. XOR of 0 with a number = that number. XOR all → duplicates cancel.',
 code:`<span class="kw">def</span> <span class="fn">singleNumber</span>(nums):
    res = <span class="nm">0</span>
    <span class="kw">for</span> n <span class="kw">in</span> nums:
        res <span class="op">^=</span> n
    <span class="kw">return</span> res

<span class="cm"># Key XOR properties:
# a ^ a = 0  (same XOR = 0)
# a ^ 0 = a  (XOR with 0 = identity)
# XOR is commutative and associative</span>`},

{cat:'bits',lc:'LC 191',d:'easy',title:'Number of 1 Bits (Hamming Weight)',
 tagline:'Count set bits in integer.',
 tags:["Brian Kernighan's","n & (n-1)"],
 insight:'n & (n-1) removes the lowest set bit each time. Count iterations until n=0.',
 code:`<span class="kw">def</span> <span class="fn">hammingWeight</span>(n):
    count = <span class="nm">0</span>
    <span class="kw">while</span> n:
        n <span class="op">&=</span> (n<span class="op">-</span><span class="nm">1</span>)  <span class="cm"># removes lowest set bit</span>
        count <span class="op">+=</span> <span class="nm">1</span>
    <span class="kw">return</span> count

<span class="cm"># Alt: bin(n).count('1')
# Each n & (n-1) clears exactly one 1-bit</span>`},

{cat:'bits',lc:'LC 268',d:'easy',title:'Missing Number',
 tagline:'Find missing number in [0..n].',
 tags:['XOR','Gauss sum'],
 insight:'Method 1: XOR all indices with all values — duplicates cancel, missing remains. Method 2: Gauss formula n*(n+1)/2 - sum.',
 code:`<span class="kw">def</span> <span class="fn">missingNumber</span>(nums):
    <span class="cm"># Gauss formula — simplest</span>
    n = <span class="fn">len</span>(nums)
    <span class="kw">return</span> n<span class="op">*</span>(n<span class="op">+</span><span class="nm">1</span>)<span class="op">//</span><span class="nm">2</span> <span class="op">-</span> <span class="fn">sum</span>(nums)

<span class="cm"># XOR version:
# res = len(nums)
# for i, n in enumerate(nums):
#     res ^= i ^ n
# return res</span>`},

// ─── ADVANCED GRAPHS ─────────────────────────────────────────────────────────
{cat:'advanced',lc:'LC 684',d:'medium',title:'Union Find (Redundant Connection)',
 tagline:'Find edge that creates a cycle — Union-Find data structure.',
 tags:['Union-Find','path compression','rank'],
 insight:'Process edges. For each, find roots of both endpoints. If same root → cycle (this is the edge). Else union.',
 code:`<span class="kw">def</span> <span class="fn">findRedundantConnection</span>(edges):
    parent = <span class="fn">list</span>(<span class="fn">range</span>(<span class="fn">len</span>(edges)<span class="op">+</span><span class="nm">1</span>))
    rank   = [<span class="nm">1</span>] <span class="op">*</span> (<span class="fn">len</span>(edges)<span class="op">+</span><span class="nm">1</span>)
    <span class="kw">def</span> <span class="fn">find</span>(x):
        <span class="kw">while</span> parent[x] <span class="op">!=</span> x:
            parent[x] = parent[parent[x]]  <span class="cm"># path compress</span>
            x = parent[x]
        <span class="kw">return</span> x
    <span class="kw">def</span> <span class="fn">union</span>(x, y):
        px, py = <span class="fn">find</span>(x), <span class="fn">find</span>(y)
        <span class="kw">if</span> px <span class="op">==</span> py: <span class="kw">return False</span>
        <span class="kw">if</span> rank[px] <span class="op">>=</span> rank[py]: parent[py] = px; rank[px] <span class="op">+=</span> <span class="nm">1</span>
        <span class="kw">else</span>:                    parent[px] = py; rank[py] <span class="op">+=</span> <span class="nm">1</span>
        <span class="kw">return True</span>
    <span class="kw">for</span> u, v <span class="kw">in</span> edges:
        <span class="kw">if not</span> <span class="fn">union</span>(u, v): <span class="kw">return</span> [u, v]`},

{cat:'advanced',lc:'LC 269',d:'hard',title:'Alien Dictionary (Topological Sort)',
 tagline:'Derive character order from sorted alien dictionary words.',
 tags:['topological sort','BFS Kahn','in-degree'],
 insight:'Extract ordering from adjacent word pairs → build directed graph. Topological sort (Kahn\'s BFS). Cycle = invalid.',
 code:`<span class="cm"># Kahn's BFS topological sort</span>
<span class="kw">def</span> <span class="fn">topoSort</span>(adj, nodes):
    in_deg = {n: <span class="nm">0</span> <span class="kw">for</span> n <span class="kw">in</span> nodes}
    <span class="kw">for</span> u <span class="kw">in</span> adj:
        <span class="kw">for</span> v <span class="kw">in</span> adj[u]: in_deg[v] <span class="op">+=</span> <span class="nm">1</span>
    q = deque([n <span class="kw">for</span> n <span class="kw">in</span> nodes <span class="kw">if</span> in_deg[n] <span class="op">==</span> <span class="nm">0</span>])
    order = []
    <span class="kw">while</span> q:
        node = q.<span class="fn">popleft</span>(); order.<span class="fn">append</span>(node)
        <span class="kw">for</span> nei <span class="kw">in</span> adj[node]:
            in_deg[nei] <span class="op">-=</span> <span class="nm">1</span>
            <span class="kw">if</span> in_deg[nei] <span class="op">==</span> <span class="nm">0</span>: q.<span class="fn">append</span>(nei)
    <span class="kw">return</span> order <span class="kw">if</span> <span class="fn">len</span>(order) <span class="op">==</span> <span class="fn">len</span>(nodes) <span class="kw">else</span> <span class="st">""</span>`},
];

// ─── STATE ──────────────────────────────────────────────────────────────────
let activeFilter = 'all';
let filtered = [];
let idx = 0;
let flipped = false;
let ratings = {}; // 0=again, 1=hard, 2=got

function getColor(catId) {
  const c = CATS.find(c => c.id === catId);
  return c ? c.color : '#38bdf8';
}

function getFiltered() {
  if (activeFilter === 'all') return CARDS;
  return CARDS.filter(c => c.cat === activeFilter);
}

function renderSidebar() {
  const el = document.getElementById('catList');
  let html = `
  <div class="cat-section-label">Overview</div>
  <div class="cat-btn ${activeFilter==='all'?'active':''}" style="--cat-color:#22d3ee" onclick="setFilter('all')">
    <span class="cat-dot" style="background:#22d3ee"></span>
    <span class="cat-name">All Patterns</span>
    <span class="cat-count">${CARDS.length}</span>
  </div>
  <div class="cat-section-label">Categories</div>`;
  
  CATS.forEach(cat => {
    const total = CARDS.filter(c => c.cat === cat.id).length;
    const mastered = CARDS.filter(c => c.cat === cat.id && ratings[c.title] === 2).length;
    const isActive = activeFilter === cat.id;
    html += `<div class="cat-btn ${isActive?'active':''}" style="--cat-color:${cat.color}" onclick="setFilter('${cat.id}')">
      <span class="cat-dot" style="background:${cat.color}"></span>
      <span class="cat-name">${cat.name}</span>
      <span class="cat-count">${total}</span>
      ${mastered > 0 ? `<span class="cat-mastered" style="color:${cat.color}">${mastered}✓</span>` : ''}
    </div>`;
  });
  el.innerHTML = html;
}

function renderCard() {
  const card = filtered[idx];
  const color = getColor(card.cat);
  const catName = CATS.find(c => c.id === card.cat)?.name || '';
  
  document.getElementById('cardFront').innerHTML = `
    <div class="card-meta">
      <span class="card-category-tag" style="color:${color};border-color:${color}40;background:${color}10">${catName}</span>
      <span class="card-lc">${card.lc} · <span class="diff-${card.d}">${card.d.toUpperCase()}</span></span>
    </div>
    <div class="card-title">${card.title}</div>
    <div class="card-tagline">${card.tagline}</div>
    <div class="card-tags">${card.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
    <div class="flip-hint">FLIP TO SEE PATTERN CODE</div>
  `;
  
  document.getElementById('cardBack').innerHTML = `
    <div class="back-label" style="color:${color}">// PATTERN · ${card.title}</div>
    <div class="code-wrap"><pre>${card.code}</pre></div>
    <div class="insight-box" style="--accent-cur:${color};border-left-color:${color}"><strong>💡 Key:</strong> ${card.insight}</div>
  `;
  
  // Reset flip
  document.getElementById('cardInner').classList.remove('flipped');
  flipped = false;
  document.getElementById('masteryRow').classList.remove('show');
  
  // Update nav
  document.getElementById('cardPos').textContent = `${idx+1} / ${filtered.length}`;
  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').disabled = idx === filtered.length - 1;
  
  // Update topbar
  const cat = CATS.find(c => c.id === (activeFilter === 'all' ? card.cat : activeFilter));
  document.getElementById('topbarCat').textContent = activeFilter === 'all' ? 'PATTERNS' : cat?.name.toUpperCase() || 'PATTERNS';
  
  updateStats();
  updateProgress();
  syncMobileNav();
}

function flip() {
  flipped = !flipped;
  document.getElementById('cardInner').classList.toggle('flipped', flipped);
  document.getElementById('masteryRow').classList.toggle('show', flipped);
  syncMobileNav();
}

function next() {
  if (idx < filtered.length - 1) { idx++; renderCard(); }
}

function prev() {
  if (idx > 0) { idx--; renderCard(); }
}

function rate(r) {
  const card = filtered[idx];
  ratings[card.title] = r;
  updateStats();
  updateProgress();
  renderSidebar();
  if (idx < filtered.length - 1) setTimeout(next, 200);
}

function setFilter(f) {
  activeFilter = f;
  filtered = getFiltered();
  idx = 0;
  renderSidebar();
  renderMobileCatStrip();
  renderCard();
}

function updateStats() {
  const f = filtered;
  document.getElementById('sTotal').textContent = f.length;
  document.getElementById('sMastered').textContent = f.filter(c => ratings[c.title] === 2).length;
  document.getElementById('sHard').textContent = f.filter(c => ratings[c.title] === 1).length;
  document.getElementById('sAgain').textContent = f.filter(c => ratings[c.title] === 0).length;
}

function updateProgress() {
  const total = CARDS.length;
  const done = CARDS.filter(c => ratings[c.title] === 2).length;
  const pct = total ? (done / total * 100) : 0;
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('progText').textContent = `${done} / ${total}`;
}

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') next();
  if (e.key === 'ArrowLeft') prev();
  if (e.key === ' ') { e.preventDefault(); flip(); }
  if (e.key === '1') rate(0);
  if (e.key === '2') rate(1);
  if (e.key === '3') rate(2);
});

// ── Mobile category strip ────────────────────────────────────────────────
function renderMobileCatStrip() {
  const el = document.getElementById('mobileCatStrip');
  if (!el) return;
  let html = `<button class="mcat-pill ${activeFilter==='all'?'active':''}" style="--pill-color:#22d3ee" onclick="setFilter('all')">All (${CARDS.length})</button>`;
  CATS.forEach(cat => {
    const total = CARDS.filter(c => c.cat === cat.id).length;
    html += `<button class="mcat-pill ${activeFilter===cat.id?'active':''}" style="--pill-color:${cat.color};${activeFilter===cat.id?`border-color:${cat.color};background:${cat.color}18`:''}" onclick="setFilter('${cat.id}')">${cat.short} (${total})</button>`;
  });
  el.innerHTML = html;
}

function syncMobileNav() {
  // Sync card position
  const mPos = document.getElementById('mCardPos');
  if (mPos) mPos.textContent = `${idx+1} / ${filtered.length}`;
  // Sync prev/next buttons
  const mPrev = document.getElementById('mPrevBtn');
  const mNext = document.getElementById('mNextBtn');
  if (mPrev) mPrev.disabled = idx === 0;
  if (mNext) mNext.disabled = idx === filtered.length - 1;
  // Sync mastery visibility
  const mm = document.getElementById('mobileMastery');
  if (mm) mm.classList.toggle('show', flipped);
}

// Init
filtered = getFiltered();
renderSidebar();
renderMobileCatStrip();
renderCard();

// ── PWA: Register Service Worker ──────────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('SW registered:', reg.scope))
      .catch(err => console.log('SW failed:', err));
  });
}
</script>
